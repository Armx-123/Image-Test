name: Automated OCR

on:
  push:
    branches:
      - main
    paths:
      - 'input.jpg'
      - 'prompt.txt'
  # Allows you to trigger the workflow manually from the GitHub UI
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  detect-objects:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cache Hugging Face models to speed up consecutive runs
    - name: Cache Hugging Face Models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-florence2-${{ hashFiles('detect.py') }}
        restore-keys: |
          ${{ runner.os }}-hf-florence2-
      
    # 4. Install required dependencies (Swapped rembg for OpenCV)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install transformers==4.44.2 timm pillow einops safetensors opencv-python-headless numpy

    # 5. Execute the object detection script
    - name: Run OCR Highlighting
      run: python ocr.py


    # 6. Commit and push the output image back to the repository (With race-condition fix)
    - name: Commit and Push Results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add output_ocr.jpg largest_text.png smallest_text.png
        
        # Only commit if changes exist
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated: Highlighted text in image"
          
          # Pull the latest remote changes using rebase to avoid conflicts
          git pull --rebase origin main
          
          # Push the synchronized changes
          git push origin main
        else
          echo "No changes to commit."
        fi
